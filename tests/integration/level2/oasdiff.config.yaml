# oasdiff allow-list for crAPI Level 2 baseline diff
# crAPI has 44 operations; our scenarios exercise a subset.
# Non-exercised paths show as "api path removed" — expected.
# Use oasdiff with --match-path to scope diff to generated paths.

exclude:
  # Server URL differs between generated (crapi-web:80) and baseline (localhost:8888)
  - path: "/info/servers"
    change: "endpoint-added"
  - path: "/info/servers"
    change: "endpoint-removed"
