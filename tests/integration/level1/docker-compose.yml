services:
  petstore:
    image: swaggerapi/petstore3:1.0.25
    ports: ["8080:8080"]
    volumes:
      - petstore-data:/data
      - ../../../ci/petstore/application.properties:/config/application.properties:ro
    environment:
      SPRING_CONFIG_LOCATION: file:/config/application.properties
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v3/openapi.json"]
      interval: 3s
      timeout: 2s
      retries: 20
    networks: [test-net]
  mitmproxy:
    image: mitmproxy/mitmproxy:11
    command: >
      mitmdump --mode regular --listen-host 0.0.0.0 --listen-port 8081
      --set confdir=/home/mitmproxy/.mitmproxy
      -w /flows/petstore.flow --set block_global=false
    ports: ["8081:8081"]
    volumes:
      - ./fixtures:/flows
      - mitm-ca:/home/mitmproxy/.mitmproxy
    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import socket,sys; s=socket.socket(); s.settimeout(1); sys.exit(0 if s.connect_ex(('127.0.0.1',8081))==0 else 1)"
      interval: 2s
      timeout: 2s
      retries: 10
    networks: [test-net]
  curl:
    image: curlimages/curl:8.11.1
    profiles: ["test"]
    working_dir: /work
    volumes:
      - ../../..:/work:rw
    networks: [test-net]
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep infinity"]
volumes:
  petstore-data:
  mitm-ca:
networks:
  test-net:
