openapi: 3.0.3
info:
  title: api.example.com API
  version: 1.0.0
servers:
- url: https://api.example.com
paths:
  /api/v1/users:
    post:
      summary: POST /api/v1/users
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  email:
                    type: string
