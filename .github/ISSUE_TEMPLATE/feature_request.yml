name: Feature Request
description: Suggest a new feature or improvement for mitm2openapi
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the use case clearly so we can evaluate the proposal.
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem are you trying to solve? What's your workflow?
      placeholder: "I'm trying to ... and the current behavior doesn't ..."
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed Solution
      description: How would you like it to work? CLI flag, new subcommand, behavior change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Workarounds you've tried, other tools that do this, or other approaches
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Links, references, or other context
    validations:
      required: false
