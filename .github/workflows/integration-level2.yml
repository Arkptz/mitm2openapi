name: Integration Level 2 (Toolshop)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: level2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Level 2 Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test-integration"

      - name: Build mitm2openapi
        run: cargo build --release

      - name: Install oasdiff
        run: |
          curl -sSfL https://raw.githubusercontent.com/tufin/oasdiff/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Install Playwright
        working-directory: tests/integration/level2
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start Toolshop stack
        working-directory: tests/integration/level2
        run: |
          docker compose up -d
          for i in $(seq 1 90); do
            if docker compose ps laravel-api | grep -q healthy; then
              echo "Services healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "ERROR: Services did not become healthy in 90s"
              docker compose logs
              exit 1
            fi
            sleep 1
          done

      - name: Seed database
        working-directory: tests/integration/level2
        run: docker compose exec -T laravel-api php artisan migrate:refresh --seed

      - name: Run Playwright scenarios
        working-directory: tests/integration/level2
        run: npx playwright test

      - name: Discover + Generate
        working-directory: tests/integration/level2
        run: |
          mkdir -p out
          $GITHUB_WORKSPACE/target/release/mitm2openapi discover \
            -i out/toolshop.flow \
            -o out/templates.yaml \
            -p "http://localhost:8091"
          sed -i 's/^  ignore: /  /g' out/templates.yaml
          $GITHUB_WORKSPACE/target/release/mitm2openapi generate \
            -i out/toolshop.flow \
            -t out/templates.yaml \
            -o out/generated.yaml \
            -p "http://localhost:8091" \
            --exclude-headers "Origin,Access-Control-Allow-Origin,Access-Control-Allow-Methods,Access-Control-Allow-Headers,Access-Control-Allow-Credentials"

      - name: Normalize + Diff
        working-directory: tests/integration/level2
        run: |
          chmod +x normalize.sh
          ./normalize.sh out/generated.yaml out/generated-normalized.yaml
          oasdiff diff $GITHUB_WORKSPACE/tests/golden/toolshop-openapi-v1.9.json out/generated-normalized.yaml --fail-on BREAKING

      - name: Teardown
        if: always()
        working-directory: tests/integration/level2
        run: docker compose down -v

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: level2-artifacts
          path: |
            tests/integration/level2/out/
            tests/integration/level2/test-results/
