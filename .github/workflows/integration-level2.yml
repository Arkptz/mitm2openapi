name: Integration Level 2 (crAPI)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: level2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Level 2 Integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test-integration"

      - name: Build mitm2openapi
        run: cargo build --release

      - name: Install oasdiff
        run: |
          curl -sSfL https://raw.githubusercontent.com/tufin/oasdiff/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run full Level 2 pipeline
        run: |
          chmod +x tests/integration/level2/run-l2.sh tests/integration/level2/normalize.sh
          tests/integration/level2/run-l2.sh

      - name: Teardown
        if: always()
        working-directory: tests/integration/level2
        run: docker compose down -v || true

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: level2-artifacts
          path: |
            tests/integration/level2/out/
            tests/integration/level2/test-results/
