name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'book/**'
      - '.github/workflows/docs.yml'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
  pull_request:
    paths:
      - 'book/**'
      - '.github/workflows/docs.yml'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Bump cache key when any tool version in the install step changes
      - name: Cache mdbook binaries
        id: cache-mdbook
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/mdbook*
          key: mdbook-v2-${{ hashFiles('.github/workflows/docs.yml') }}

      - name: Install mdbook and plugins
        if: steps.cache-mdbook.outputs.cache-hit != 'true'
        run: |
          cargo install \
            mdbook@0.4.40 \
            mdbook-linkcheck@0.7.7 \
            mdbook-toc@0.14.2 \
            mdbook-admonish@1.18.0 \
            mdbook-mermaid@0.14.1

      - name: Install mdbook-admonish assets
        run: mdbook-admonish install book

      - name: Build book
        run: mdbook build book

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v4
        with:
          path: target/book/html

      - name: Verify build (PR)
        if: github.event_name == 'pull_request'
        run: |
          test -f target/book/html/index.html
          test -s target/book/html/index.html
          echo "Build OK"

  deploy:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
